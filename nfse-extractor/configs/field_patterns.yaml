version: "1.0"
patterns:
  issue_date:
    - "\\b\\d{2}/\\d{2}/\\d{4}\\b"
  competence_date:
    - "\\b\\d{2}/\\d{4}\\b"
    - "\\b\\d{2}/\\d{2}/\\d{4}\\b"
  provider_document:
    - "\\b\\d{2}\\.\\d{3}\\.\\d{3}/\\d{4}-\\d{2}\\b"
    - "\\b\\d{14}\\b"
    - "\\b\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}\\b"
    - "\\b\\d{11}\\b"
  recipient_document:
    - "\\b\\d{2}\\.\\d{3}\\.\\d{3}/\\d{4}-\\d{2}\\b"
    - "\\b\\d{14}\\b"
    - "\\b\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}\\b"
    - "\\b\\d{11}\\b"
  verification_code:
    - "\\b[A-Z0-9]{5,12}\\b"
  gross_amount:
    - "\\b\\d{1,3}(?:\\.\\d{3})*,\\d{2}\\b"
    - "\\b\\d+(?:\\.\\d{2})\\b"
  taxable_amount:
    - "\\b\\d{1,3}(?:\\.\\d{3})*,\\d{2}\\b"
    - "\\b\\d+(?:\\.\\d{2})\\b"
  iss_amount:
    - "\\b\\d{1,3}(?:\\.\\d{3})*,\\d{2}\\b"
    - "\\b\\d+(?:\\.\\d{2})\\b"
  iss_withheld_amount:
    - "\\b\\d{1,3}(?:\\.\\d{3})*,\\d{2}\\b"
    - "\\b\\d+(?:\\.\\d{2})\\b"
  net_amount:
    - "\\b\\d{1,3}(?:\\.\\d{3})*,\\d{2}\\b"
    - "\\b\\d+(?:\\.\\d{2})\\b"
